<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Backdrop Gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.25" />
    </linearGradient>

    <linearGradient id="text-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#0891b2" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3" />
    </linearGradient>

    <!-- Glowing effect blur filter -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Custom Font Injections for Standalone SVG Compatibility -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@700&amp;display=swap');
      .brand-title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 72px;
        fill: #ffffff;
        letter-spacing: -1.5px;
      }
      .brand-sub {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 72px;
        fill: url(#brand-char-grad);
        letter-spacing: -1.5px;
      }
      .sub-title {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 500;
        font-size: 28px;
        fill: #94a3b8;
        letter-spacing: 0.5px;
      }
      .pill-text {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #38bdf8;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .footer-text {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 15px;
        fill: #4b5563;
        letter-spacing: 1px;
      }
    </style>

    <linearGradient id="brand-char-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <!-- Base Canvas Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />

  <!-- Soft Glowing Aurora Orbs -->
  <circle cx="200" cy="150" r="300" fill="url(#accent-glow)" filter="url(#glow-filter)" />
  <circle cx="1000" cy="480" r="280" fill="url(#accent-glow)" filter="url(#glow-filter)" />

  <!-- Elegant Grid Pattern background overlay (Subtle Opacity) -->
  <g opacity="0.04">
    <path d="M0 50 H1200 M0 100 H1200 M0 150 H1200 M0 200 H1200 M0 250 H1200 M0 300 H1200 M0 350 H1200 M0 400 H1200 M0 450 H1200 M0 500 H1200 M0 550 H1200 M0 600 H1200" stroke="#ffffff" stroke-width="1.5" />
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Floating Neumorphic Main Brand Frame -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="#0c111d" fill-opacity="0.8" stroke="url(#border-grad)" stroke-width="2" filter="url(#card-shadow)" />

  <!-- Accent Corner Highlights -->
  <path d="M100 80 H140 M80 100 V140" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" />
  <path d="M1100 80 H1060 M1120 100 V140" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />

  <!-- Content Group -->
  <g transform="translate(140, 160)">
    
    <!-- Top Spark Badge Label -->
    <g transform="translate(0, 0)">
      <!-- Pill Container -->
      <rect width="210" height="36" rx="18" fill="#083344" fill-opacity="0.6" stroke="#0e7490" stroke-width="1.5" />
      <circle cx="18" cy="18" r="4" fill="#22d3ee" />
      <text x="32" y="23" class="pill-text">TOOLKIT SYSTEM</text>
    </g>

    <!-- Hero Title Header -->
    <g transform="translate(0, 95)">
      <text class="brand-title">TextToolkit<tspan class="brand-sub">Hub</tspan></text>
    </g>

    <!-- Subtitle Definition -->
    <g transform="translate(0, 155)">
      <text class="sub-title">An incredibly fast, free, and 100% private developer utility sandbox.</text>
    </g>

    <!-- Dynamic Capabilities Slats -->
    <g transform="translate(0, 215)">
      <!-- Feature Card 1 -->
      <g transform="translate(0, 0)">
        <rect width="170" height="44" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#475569" stroke-width="1" />
        <text x="20" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">CONVERT CASE</text>
      </g>
      
      <!-- Feature Card 2 -->
      <g transform="translate(190, 0)">
        <rect width="150" height="44" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#475569" stroke-width="1" />
        <text x="20" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">CLEAN TEXT</text>
      </g>

      <!-- Feature Card 3 -->
      <g transform="translate(360, 0)">
        <rect width="180" height="44" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#475569" stroke-width="1" />
        <text x="20" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">COMPARE DIFFS</text>
      </g>

      <!-- Feature Card 4 -->
      <g transform="translate(560, 0)">
        <rect width="160" height="44" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#475569" stroke-width="1" />
        <text x="20" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">BASE64 / CODE</text>
      </g>
    </g>

  </g>

  <!-- Frame Footer Line -->
  <line x1="140" y1="480" x2="1060" y2="480" stroke="#1e293b" stroke-width="1" />

  <!-- Bottom Brand Accents -->
  <text x="140" y="513" class="footer-text">16 HIGH-FIDELITY TOOLS • OFFLINE-READY • NO DATA LEAKAGE</text>
  <text x="940" y="513" class="footer-text" text-anchor="end">texttoolkithub.com</text>

  <!-- Tiny Decorative Wave Signal Right Side -->
  <g transform="translate(980, 503)" opacity="0.4">
    <circle cx="10" cy="10" r="3" fill="#06b6d4" />
    <circle cx="22" cy="10" r="3" fill="#6366f1" />
    <circle cx="34" cy="10" r="3" fill="#a855f7" />
  </g>
</svg>
