<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for subtle depth -->
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8faff" />
    </radialGradient>

    <!-- Main Front Face Gradient for T (Vibrant Premium Blue) -->
    <linearGradient id="brand_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3da2ff" />
      <stop offset="40%" stop-color="#1a7eff" />
      <stop offset="100%" stop-color="#0052d9" />
    </linearGradient>

    <!-- Main Front Face Gradient for Chat Bubble (Vibrant Premium Blue) -->
    <linearGradient id="bubble_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- 3D Shadow/Extrusion Gradient for Depth -->
    <linearGradient id="shadow_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a4dbd" />
      <stop offset="100%" stop-color="#05338a" />
    </linearGradient>

    <!-- Drop Shadow Filter for professional touch -->
    <filter id="drop_shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="10" stdDeviation="8" flood-color="#0a3fa0" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Clean, vibrant outer border circle -->
  <circle cx="256" cy="256" r="238" fill="url(#bg_grad)" stroke="#1066e2" stroke-width="15" />

  <!-- 3D Extrusion Shadows (Drawn behind the main elements with a slight offset) -->
  <g transform="translate(6, 12)">
    <!-- T shadow (symmetrical & parallel) -->
    <path d="M 140 130 
             L 340 130 
             C 356 130, 370 144, 370 160 
             C 370 176, 356 190, 340 190 
             L 275 190 
             L 220 410 
             C 220 429, 205 440, 185 440 
             C 165 440, 150 429, 150 410 
             L 205 190 
             L 140 190 
             C 124 190, 110 176, 110 160 
             C 110 144, 124 130, 140 130 
             Z" 
          fill="url(#shadow_grad)" />

    <!-- Chat bubble shadow -->
    <path d="M 260 230 
             L 390 230 
             Q 420 230, 420 260 
             L 420 350 
             Q 420 380, 390 380 
             L 300 380 
             L 245 415 
             L 260 375 
             Q 250 370, 250 350 
             L 250 260 
             Q 250 230, 260 230 Z" 
          fill="url(#shadow_grad)" />
  </g>

  <!-- Front Faces of the Elements (With Premium Dual Gradients and Mask Separator) -->
  <g filter="url(#drop_shadow)">
    <!-- Main Symmetrical italic "T" Shape -->
    <path d="M 140 130 
             L 340 130 
             C 356 130, 370 144, 370 160 
             C 370 176, 356 190, 340 190 
             L 275 190 
             L 220 410 
             C 220 429, 205 440, 185 440 
             C 165 440, 150 429, 150 410 
             L 205 190 
             L 140 190 
             C 124 190, 110 176, 110 160 
             C 110 144, 124 130, 140 130 
             Z" 
          fill="url(#brand_grad)" />

    <!-- Chat Bubble White Mask Separator (Slices beautifully through T stem to ensure clear separation) -->
    <path d="M 260 230 
             L 390 230 
             Q 420 230, 420 260 
             L 420 350 
             Q 420 380, 390 380 
             L 300 380 
             L 245 415 
             L 260 375 
             Q 250 370, 250 350 
             L 250 260 
             Q 250 230, 260 230 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="12" 
          stroke-linejoin="round" 
          stroke-linecap="round" />

    <!-- Main Chat Bubble Shape in Vibrant Indigo-Purple -->
    <path d="M 260 230 
             L 390 230 
             Q 420 230, 420 260 
             L 420 350 
             Q 420 380, 390 380 
             L 300 380 
             L 245 415 
             L 260 375 
             Q 250 370, 250 350 
             L 250 260 
             Q 250 230, 260 230 Z" 
          fill="url(#bubble_grad)" />

    <!-- Three Horizontal White Message Dots inside Chat Bubble -->
    <circle cx="295" cy="305" r="14" fill="#ffffff" />
    <circle cx="335" cy="305" r="14" fill="#ffffff" />
    <circle cx="375" cy="305" r="14" fill="#ffffff" />
  </g>
</svg>
